<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Number</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#212121;
            color:white;
        }

        .wrapper{
            width:400px;
            text-align:center;
            background:#333;
            padding:30px;
            border-radius:10px;
        }

        h1{
            margin-bottom:20px;
        }

        p{
            margin:10px 0;
        }

        input{
            width:120px;
            padding:10px;
            font-size:18px;
            text-align:center;
        }

        button{
            padding:10px 20px;
            margin-top:15px;
            cursor:pointer;
            font-size:16px;
        }

        #result{
            margin-top:20px;
            font-size:22px;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="wrapper">

    <h1>Guess The Number</h1>

    <p>Guess a number between <b>1 and 100</b></p>

    <input type="number" id="guessField">

    <br><br>

    <button id="submit">Submit Guess</button>

    <p id="previous">Previous Guesses:</p>

    <p id="remaining">Remaining Guesses: 10</p>

    <h2 id="result"></h2>

</div>

<script>

const randomNumber = Math.floor(Math.random() * 100) + 1;

const guessField = document.querySelector("#guessField");
const submit = document.querySelector("#submit");

const previous = document.querySelector("#previous");
const remaining = document.querySelector("#remaining");
const result = document.querySelector("#result");

let previousGuesses = [];
let attempts = 10;

submit.addEventListener("click", function(){

    const guess = Number(guessField.value);

    if(isNaN(guess) || guess < 1 || guess > 100){
        alert("Please enter a number between 1 and 100.");
        return;
    }

    previousGuesses.push(guess);

    previous.textContent = `Previous Guesses: ${previousGuesses.join(", ")}`;

    attempts--;

    remaining.textContent = `Remaining Guesses: ${attempts}`;

    if(guess === randomNumber){

        result.textContent = "🎉 Congratulations! You guessed it!";
        submit.disabled = true;

    }

    else if(guess < randomNumber){

        result.textContent = "📉 Too Low!";

    }

    else{

        result.textContent = "📈 Too High!";

    }

    if(attempts === 0 && guess !== randomNumber){

        result.textContent = `❌ Game Over! Number was ${randomNumber}`;
        submit.disabled = true;

    }

    guessField.value = "";
    guessField.focus();

});

</script>

</body>
</html>
