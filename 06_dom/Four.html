<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chai aur code | DOM</title>
</head>
<body style="background-color: #090909; color: white; font-family: Arial, sans-serif;">
    <ul class = languages >
        <li>JavaScript</li>
    </ul>
    <ul class="langtype">

    </ul>
</body> 
<script>
    function addLanguage(langName, langType) {
    const li1 = document.createElement("li");
    li1.textContent = langName;
    document.querySelector(".languages").appendChild(li1);

    const li2 = document.createElement("li");
    li2.textContent = langType;
    document.querySelector(".langtype").appendChild(li2);
}
 function addoption(languages){
 const type = document.createElement("li");
 type.appendChild(document.createTextNode(languages));
 document.querySelector(".languages").appendChild(type);
 }

addLanguage("JavaScript", "Programming Language");
addLanguage("Python", "Interpreter");
addLanguage("HTML", "Markup Language");
  addoption("HTML");
const secondLang = document.querySelector(".languages li:nth-child(2)");
const newLi = document.createElement("li");
newLi.innerHTML = "Messi";
secondLang.replaceWith(newLi);

const lastlang= document.querySelector(".languages li:nth-child(3)");
lastlang.remove();

</script>
</html>
